name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    env:
      APP_ENV: ci
      APP_PORT: 8418
      PROCESSED_DATA_DIR: ${{ github.workspace }}/data/processed
      BACKEND_CORS_ORIGINS: http://localhost:3418
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8418
      SONAR_PROJECT_KEY: Tomvelcas_RetoRappiAI
      SONAR_ORGANIZATION: tomvelcas

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint backend
        working-directory: backend
        run: ruff check .

      - name: Run backend tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --junitxml=pytest.xml

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8418
        run: npm run build

      - name: Install Newman
        run: npm install --global newman

      - name: Start backend for API smoke tests
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8418 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend readiness
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8418/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/backend.log
          exit 1

      - name: Run Newman API smoke tests
        run: |
          newman run qa/postman/dashboard-api.collection.json \
            --env-var base_url=http://127.0.0.1:8418 \
            --reporters cli,junit \
            --reporter-junit-export newman-report.xml

      - name: Detect SonarQube Cloud configuration
        id: sonarcloud
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=false" >> "$GITHUB_OUTPUT"

      - name: Note skipped Sonar scan
        if: ${{ steps.sonarcloud.outputs.configured != 'true' }}
        run: |
          echo "Sonar omitido: configure el secreto SONAR_TOKEN en GitHub." >> "$GITHUB_STEP_SUMMARY"

      - name: Run SonarQube Cloud scan
        if: ${{ steps.sonarcloud.outputs.configured == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            "-Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}"
            "-Dsonar.organization=${{ env.SONAR_ORGANIZATION }}"

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            backend/coverage.xml
            backend/pytest.xml
            frontend/coverage/lcov.info
            newman-report.xml
            /tmp/backend.log
          if-no-files-found: warn
